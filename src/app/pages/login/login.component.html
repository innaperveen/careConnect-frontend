<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CareConnect | Healthcare Login</title>

</head>
<body>

<div class="login-container">
    <div class="login-card">

        <!-- Logo -->
        <div class="logo">
            <div class="icon">❤</div>
            <h2>CareConnect</h2>
            <p>Connecting Healthcare Professionals</p>
        </div>

        <!-- Role Selection -->
        <div class="role-section">
            <p class="label">SELECT YOUR ROLE</p>

            <div class="roles">
                <div 
                    class="role-card"
                    [class.active]="selectedRole === 'nurse'"
                    (click)="selectRole('nurse')">
                    👩‍⚕️
                    <span>Nurse</span>
                </div>

                <div 
                    class="role-card"
                    [class.active]="selectedRole === 'patient'"
                    (click)="selectRole('patient')">
                    🧑‍🦽
                    <span>Patient</span>
                </div>

                <div 
                    class="role-card"
                    [class.active]="selectedRole === 'admin'"
                    (click)="selectRole('admin')">
                    🛠
                    <span>Admin</span>
                </div>
            </div>
        </div>

        <!-- Form -->
<form #loginForm="ngForm" (ngSubmit)="onLogin(loginForm)">

  <div class="form-group">
    <label>Email Address</label>
    <input 
    placeholder="Enter Your Email"
      type="email"
      name="email"
      [(ngModel)]="email"
      #emailRef="ngModel"
      required
      email
    >

    <small *ngIf="emailRef.invalid && emailRef.touched">
      Valid email is required
    </small>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input 
    placeholder="Enter Your Password"
      type="password"
      name="password"
      [(ngModel)]="password"
      #passRef="ngModel"
      required
      minlength="6"
    >

    <small *ngIf="passRef.invalid && passRef.touched">
      Min 6 characters required
    </small>
  </div>

  <button [disabled]="loginForm.invalid" class="login-btn">
    Login
  </button>

</form>
        <p class="register">
            New user?<span (click)="goToRegister()">Register here</span>
        </p>

    </div>
</div>


</body>
</html>
