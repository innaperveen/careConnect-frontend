<div class="login-container">
  <div class="login-card">

    <!-- Logo -->
    <div class="logo">
      <div class="icon">❤</div>
      <h2>CareConnect</h2>
      <p>Connecting Healthcare Professionals</p>
    </div>

    <!-- Role Selection -->
    <div class="role-section">
      <p class="label">SELECT YOUR ROLE</p>
      <div class="roles">

        <div class="role-card" [class.active]="selectedRole === 'patient'" (click)="selectRole('patient')">
          🧑‍🦽
          <span>Patient</span>
        </div>

        <div class="role-card" [class.active]="selectedRole === 'nurse'" (click)="selectRole('nurse')">
          👩‍⚕️
          <span>Nurse</span>
        </div>

        <div class="role-card" [class.active]="selectedRole === 'organization'" (click)="selectRole('organization')">
          🏥
          <span>Organization</span>
        </div>

      </div>
    </div>

    <!-- Reactive Form -->
    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <!-- Identifier field — email for patient/nurse, license number for organization -->
      <div class="form-group">
        <label>{{ identifierLabel }}</label>
        <input
          [type]="identifierType"
          [placeholder]="identifierPlaceholder"
          formControlName="identifier"
          [class.input-error]="identifier.invalid && identifier.touched"
          [class.field-text]="selectedRole === 'organization'"
        >
        <small *ngIf="identifier.touched && identifier.hasError('required')">This field is required.</small>
        <small *ngIf="identifier.touched && identifier.hasError('email') && selectedRole !== 'organization'">
          Enter a valid email address.
        </small>
        <small *ngIf="identifier.touched && identifier.hasError('minlength') && selectedRole === 'organization'">
          Enter a valid registration / license number.
        </small>
      </div>

      <!-- Password -->
      <div class="form-group password-group">
        <label>Password</label>
        <input
          type="password"
          placeholder="Enter your password"
          formControlName="password"
          [class.input-error]="password.invalid && password.touched"
        >
        <small *ngIf="password.touched && password.hasError('required')">Password is required.</small>
        <small *ngIf="password.touched && password.hasError('minlength')">Minimum 6 characters.</small>
        <span class="forgot" routerLink="/forgot-password">Forgot password?</span>
      </div>

      <button type="submit" class="login-btn">
        <i class="bi bi-box-arrow-in-right me-1"></i>
        Login as {{ selectedRole === 'organization' ? 'Organization' : (selectedRole | titlecase) }}
      </button>

    </form>

    <p class="register">
      New user? <span routerLink="/register">Register here</span>
    </p>

  </div>
</div>
